version: "3.7"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plants
      POSTGRES_USER: plants
      POSTGRES_PASSWORD: plants
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plants -d plants"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://plants:plants@db:5432/plants
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      - db   # 👈 simplified for old docker-compose

  web:
    build:
      context: ./apps/web
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
