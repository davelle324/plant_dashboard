version: "3.7"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plants
      POSTGRES_USER: plants
      POSTGRES_PASSWORD: plants
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plants -d plants"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Start the server, wait until it responds, then pull the model if not cached.
    # On subsequent starts the pull is a no-op (model lives in the volume).
    entrypoint: >
      sh -c "ollama serve &
             until ollama list 2>/dev/null; do sleep 2; done;
             ollama pull ${AI_MODEL:-qwen2.5:0.5b};
             wait"

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://plants:plants@db:5432/plants
      OLLAMA_URL: http://ollama:11434
      AI_MODEL: qwen2.5:0.5b
      UPLOAD_DIR: /uploads
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - uploads_data:/uploads
    depends_on:
      - db
      - ollama

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""
      CLERK_SECRET_KEY: ""
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    command: sh -c "npm ci && npm run dev"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  ollama_data:
  uploads_data:
